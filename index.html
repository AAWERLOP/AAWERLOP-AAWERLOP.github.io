<button id="backToTop" class="fixed bottom-6 right-6 win7-glass w-12 h-12 flex items-center justify-center text-primary opacity-0 transition-opacity">
  <i class="fas fa-arrow-up"></i>
</button>

<script>
  // 回到顶部
  const btn = document.getElementById('backToTop');
  window.addEventListener('scroll',()=>{ btn.style.opacity = window.scrollY>300 ? '1':'0'; });
  btn.addEventListener('click',()=>{ window.scrollTo({top:0,behavior:'smooth'}); });

  // 眼睛跟随鼠标
  const eyes = document.querySelectorAll('.eye');
  document.addEventListener('mousemove', (e) => {
    eyes.forEach(eye => {
      const r = eye.getBoundingClientRect();
      const cx = r.left + r.width/2;
      const cy = r.top + r.height/2;
      const dx = e.clientX - cx;
      const dy = e.clientY - cy;
      const rad = Math.atan2(dy, dx);
      const max = 20;
      const dist = Math.min(Math.hypot(dx, dy), max);
      const px = Math.cos(rad)*dist;
      const py = Math.sin(rad)*dist;
      eye.querySelector('.pupil').style.transform = `translate(calc(-50% + ${px}px), calc(-50% + ${py}px))`;
    });
  });

  // ==============================================
  // MikuTap 点击发声 + 光圈效果
  // ==============================================
  const sounds = [
    document.getElementById("sound1"),
    document.getElementById("sound2"),
    document.getElementById("sound3"),
    document.getElementById("sound4"),
    document.getElementById("sound5"),
    document.getElementById("sound6"),
    document.getElementById("sound7")
  ];

  // 点击播放音效 + 扩散圈
  document.addEventListener("click", (e) => {
    const snd = sounds[Math.floor(Math.random() * sounds.length)];
    snd.currentTime = 0;
    snd.play().catch(()=>{});

    const ripple = document.createElement("div");
    ripple.classList.add("ripple");
    ripple.style.width = ripple.style.height = "60px";
    ripple.style.left = e.clientX - 30 + "px";
    ripple.style.top = e.clientY - 30 + "px";
    document.body.appendChild(ripple);
    setTimeout(() => ripple.remove(), 700);
  });
</script>
